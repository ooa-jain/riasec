# gunicorn.conf.py
# ─────────────────────────────────────────────────────────────────────────────
# Gunicorn production configuration for JAIN RIASEC
# Run with: gunicorn -c gunicorn.conf.py app:app
# ─────────────────────────────────────────────────────────────────────────────

import multiprocessing
import os

# ── Binding ────────────────────────────────────────────────────────────────────
bind        = f"0.0.0.0:{os.getenv('PORT', '8015')}"

# ── Workers ────────────────────────────────────────────────────────────────────
# gthread worker: each worker has multiple threads — good for I/O-heavy apps
# (your app does lots of requests.get / SMTP / Google Sheets calls)
worker_class = "gthread"

# For a shared host with limited CPU, 2–4 workers is safe.
# If Hostinger gives you a dedicated VPS, use: (2 * cpu_count) + 1
workers      = int(os.getenv('WEB_WORKERS', '4'))
threads      = int(os.getenv('WEB_THREADS', '4'))

# Max simultaneous requests = workers × threads = 16 by default
# 2000 users doing light, bursty actions is very comfortable at this level.

# ── Timeouts ───────────────────────────────────────────────────────────────────
timeout         = 30   # kill a worker if it doesn't respond in 30s
keepalive       = 5    # keep-alive connections for 5s (good for browsers)
graceful_timeout = 10  # wait 10s for in-flight requests before hard kill

# ── Limits ─────────────────────────────────────────────────────────────────────
max_requests      = 1000  # restart a worker after 1000 requests (prevents memory leaks)
max_requests_jitter = 100 # randomise so all workers don't restart at the same time

# ── Logging ────────────────────────────────────────────────────────────────────
accesslog  = "-"   # stdout
errorlog   = "-"   # stderr
loglevel   = "info"
access_log_format = '%(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s %(D)sµs'

# ── Security ───────────────────────────────────────────────────────────────────
limit_request_line    = 4096   # max URL length
limit_request_fields  = 100    # max HTTP headers
limit_request_field_size = 8190