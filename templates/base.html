<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}RIASEC – Jain University{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f1623;--ink2:#374151;--muted:#6b7280;--line:#e5e7eb;
  --bg:#f7f8fc;--white:#ffffff;
  --accent:#2563eb;--accent2:#7c3aed;
  --grad:linear-gradient(135deg,#2563eb,#7c3aed);
  --radius:14px;
  --shadow:0 2px 16px rgba(15,22,35,0.07),0 1px 3px rgba(15,22,35,0.04);
  --shadow-lg:0 12px 40px rgba(15,22,35,0.13),0 3px 10px rgba(15,22,35,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased;font-size:16px}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;height:68px;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);z-index:200;
  display:flex;align-items:center;padding:0 36px;gap:0
}
.topbar-logo{display:flex;align-items:center;gap:0;text-decoration:none;flex-shrink:0}
.topbar-logo-jain{height:48px;width:auto;object-fit:contain;display:block}
.topbar-logo-divider{width:1px;height:36px;background:var(--line);margin:0 14px;flex-shrink:0}
.topbar-logo-ucam{height:40px;width:auto;object-fit:contain;display:block}
.topbar-logo-fallback-wrap{display:none;align-items:center;gap:8px}
.topbar-logo-fallback-text{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2}
.topbar-logo-fallback-sub{font-size:10px;color:var(--muted);display:block;font-weight:400}
.topbar-logo-ucam-fallback{display:none;flex-direction:column;gap:0}
.topbar-logo-ucam-name{font-size:14px;font-weight:800;color:var(--ink);letter-spacing:-0.3px}
.topbar-logo-ucam-sub{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

.topbar-spacer{flex:1}
.topbar-nav{display:flex;align-items:center;gap:2px}
.nav-link{padding:7px 13px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);
  text-decoration:none;transition:all 0.15s;border:none;background:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap}
.nav-link:hover{background:#f1f5f9;color:var(--ink)}
.nav-link.active{background:rgba(37,99,235,0.08);color:var(--accent)}
.nav-link.nav-programs{background:rgba(37,99,235,0.06);color:var(--accent);border:1px solid rgba(37,99,235,0.18);font-weight:600}
.nav-link.nav-programs:hover{background:rgba(37,99,235,0.12);border-color:rgba(37,99,235,0.3)}
.nav-divider{width:1px;height:18px;background:var(--line);margin:0 5px}
.nav-user-chip{display:flex;align-items:center;gap:7px;padding:5px 14px;border-radius:40px;background:#f8fafc;border:1px solid var(--line)}
.nav-avatar{width:26px;height:26px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
.nav-user-name{font-size:12px;font-weight:600;color:var(--ink2)}

/* Hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;border-radius:8px;background:none;border:none}
.hamburger span{display:block;width:20px;height:2px;background:var(--ink2);border-radius:2px;transition:all 0.28s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* Mobile drawer */
.mobile-drawer{
  position:fixed;top:68px;left:0;right:0;background:rgba(255,255,255,0.98);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--line);z-index:199;
  padding:10px 18px 18px;display:none;flex-direction:column;gap:3px;box-shadow:0 8px 32px rgba(0,0,0,0.07)
}
.mobile-drawer.open{display:flex}
.mobile-nav-link{padding:11px 14px;border-radius:10px;font-size:14px;font-weight:500;color:var(--ink2);
  text-decoration:none;display:flex;align-items:center;gap:10px;border:none;background:none;
  cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;text-align:left;transition:background 0.15s}
.mobile-nav-link:hover{background:#f8fafc}
.mobile-nav-link.active{background:rgba(37,99,235,0.07);color:var(--accent)}
.drawer-divider{height:1px;background:var(--line);margin:7px 0}

/* MAIN */
.main-content{position:relative;z-index:1;padding-top:68px;min-height:100vh}

/* FORMS */
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:0.4px;text-transform:uppercase}
.input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;
  color:var(--ink);background:#f9fafb;outline:none;transition:all 0.18s;font-family:'DM Sans',sans-serif;font-weight:400}
.input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.input::placeholder{color:#c4cad4;font-size:14px}
.hint{font-size:11px;color:#c4cad4;margin-top:4px;display:block}
.phone-row{display:flex;gap:8px}
.flag-select{width:140px;flex-shrink:0;cursor:pointer}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;
  background:var(--grad);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;
  cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;text-decoration:none;letter-spacing:-0.1px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,0.3);color:#fff}
.btn:active{transform:translateY(0)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--muted);box-shadow:none}
.btn-ghost:hover{background:#f8fafc;border-color:#cbd5e1;box-shadow:none;transform:none;color:var(--ink)}
.btn-sm{width:auto;padding:9px 18px;font-size:13px}
.btn-row{display:flex;gap:10px}.btn-row .btn{flex:1}

/* ALERTS */
.alert{padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:13px;
  display:none;align-items:center;gap:10px;font-weight:500;line-height:1.4}
.alert.show{display:flex}
.alert-error{background:rgba(220,53,69,0.07);color:#dc3545;border-left:3px solid #dc3545}
.alert-success{background:rgba(22,163,74,0.07);color:#16a34a;border-left:3px solid #16a34a}
.alert-info{background:rgba(37,99,235,0.07);color:var(--accent);border-left:3px solid var(--accent)}

/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(247,248,252,0.95);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(8px)}
.loading-overlay.active{display:flex}
.loader-card{background:#0f1623;padding:1rem 2.2rem;border-radius:1.3rem;margin-bottom:14px}
.loader{color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;height:38px;padding:8px;display:flex;align-items:center}
.words{overflow:hidden;position:relative}
.words::after{content:"";position:absolute;inset:0;background:linear-gradient(#0f1623 10%,transparent 30%,transparent 70%,#0f1623 90%);z-index:20}
.word{display:block;height:100%;padding-left:6px;color:#60a5fa;animation:spin_w 4s infinite}
@keyframes spin_w{10%{transform:translateY(-102%)}25%{transform:translateY(-100%)}35%{transform:translateY(-202%)}50%{transform:translateY(-200%)}60%{transform:translateY(-302%)}75%{transform:translateY(-300%)}85%{transform:translateY(-402%)}100%{transform:translateY(-400%)}}
.loading-label{color:var(--muted);font-size:13px;font-weight:500}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#dde1ea;border-radius:10px}

@media(max-width:900px){
  .topbar{padding:0 18px}
  .topbar-nav{display:none}
  .hamburger{display:flex}
  .topbar-logo-jain{height:36px}
  .topbar-logo-ucam{height:30px}
  .topbar-logo-divider{height:28px;margin:0 10px}
}
@media(max-width:400px){.topbar{padding:0 12px}}
</style>
{% block head %}{% endblock %}
</head>

<script>
function toggleDrawer(){
  var d=document.getElementById('mobileDrawer'),h=document.getElementById('hamburger');
  var open=d.classList.toggle('open');h.classList.toggle('open',open);
}
document.addEventListener('click',function(e){
  var d=document.getElementById('mobileDrawer'),h=document.getElementById('hamburger');
  if(!d.contains(e.target)&&!h.contains(e.target)){d.classList.remove('open');h.classList.remove('open');}
});
function showLoad(msg){document.getElementById('loadingText').textContent=msg||'Please wait...';document.getElementById('loadingOverlay').classList.add('active');}
function hideLoad(){document.getElementById('loadingOverlay').classList.remove('active');}

/* ── USER STORAGE — robust, NaN-safe ── */
function getUser(){
  try{
    var s=localStorage.getItem('riasec_user')||sessionStorage.getItem('riasec_user');
    if(!s||s==='null'||s==='undefined')return null;
    var u=JSON.parse(s);
    if(!u||!u.name||String(u.name).trim()==='')return null;
    if(u.scores){
      var keys=['R','I','A','S','E','C'];
      for(var i=0;i<keys.length;i++){
        var v=parseInt(String(u.scores[keys[i]]||0),10);
        u.scores[keys[i]]=isNaN(v)?0:v;
      }
    }
    return u;
  }catch(e){return null;}
}
function saveUser(u){
  if(!u)return;
  var str=JSON.stringify(u);
  try{localStorage.setItem('riasec_user',str);}catch(e){}
  try{sessionStorage.setItem('riasec_user',str);}catch(e){}
}
function clearUser(){
  try{localStorage.removeItem('riasec_user');}catch(e){}
  try{sessionStorage.removeItem('riasec_user');}catch(e){}
}
function logout(){clearUser();window.location.href='/entry';}

/* Course scoring weights */
const COURSE_MATCH_WEIGHTS=[[15,10,5],[10,7,3],[5,3,1]];
function calcCourseScore(courseTraits,studentTop3){
  var score=0;
  for(var si=0;si<studentTop3.length;si++){
    for(var ci=0;ci<courseTraits.length;ci++){
      if(studentTop3[si]===courseTraits[ci]) score+=COURSE_MATCH_WEIGHTS[si][ci];
    }
  }
  return score;
}
